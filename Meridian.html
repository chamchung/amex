<!DOCTYPE html>
<html lang="en" class="reveal-armed">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meridian — The Card</title>
<link rel="stylesheet" href="meridian.css" />
<link rel="stylesheet" href="meridian-sections.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="meridian-shared.jsx"></script>
<script type="text/babel" src="meridian-sections-a.jsx"></script>
<script type="text/babel" src="meridian-sections-b.jsx"></script>
<script type="text/babel" src="meridian-app.jsx"></script>

<script>
  /* ultimate safety: if the app failed to boot at all, never leave the
     reveal-armed content permanently hidden. */
  setTimeout(function () {
    var el = document.querySelector('.reveal');
    if (!el || (el.dataset.revStart === undefined && el.dataset.revDone === undefined)) {
      document.documentElement.classList.remove('reveal-armed');
    }
  }, 5000);
</script>
</body>
</html>
